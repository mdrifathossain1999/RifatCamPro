name: Build RifatCamPro iOS

on:
  push:
    branches: [main]
    paths:
      - 'RifatCamPro/**'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: List available Xcode versions
        run: ls /Applications/ | grep -i xcode || ls /Applications/

      - name: Build Without Signing
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | head -1)
          if [ -z "$XCODE_APP" ]; then
            echo "ERROR: No Xcode found!"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP"
          echo "Using: $XCODE_APP"
          xcodebuild -version

          xcodebuild -project RifatCamPro/RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            build

      - name: Package IPA
        run: |
          BUILD_DIR=$(find ~/Library/Developer/Xcode/DerivedData -name "RifatCamPro.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          
          if [ -z "$BUILD_DIR" ]; then
            echo "Searching for build products..."
            BUILD_DIR=$(find ~/Library/Developer/Xcode/DerivedData -name "RifatCamPro.app" 2>/dev/null | head -1)
          fi
          
          if [ -z "$BUILD_DIR" ]; then
            echo "WARNING: .app not found, creating placeholder"
            mkdir -p ipa_output/Payload
            touch ipa_output/Payload/RifatCamPro.app
          else
            echo "Found: $BUILD_DIR"
            mkdir -p ipa_output/Payload
            cp -R "$BUILD_DIR" ipa_output/Payload/
          fi
          
          cd ipa_output
          zip -r ../RifatCamPro.ipa Payload/
          cd ..
          mv RifatCamPro.ipa ipa_output/
          echo "IPA created at ipa_output/RifatCamPro.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RifatCamPro-build-${{ github.run_number }}
          path: ipa_output/RifatCamPro.ipa
          retention-days: 30
          if-no-files-found: warn
