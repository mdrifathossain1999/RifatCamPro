name: Build RifatCamPro iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show Schemes
        run: |
          ls -la RifatCamPro.xcodeproj/
          xcodebuild -project RifatCamPro.xcodeproj -list

      - name: Build App
        run: |
          set -e
          xcodebuild -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            clean build 2>&1 | tee build.log

          echo "=== TAIL ==="
          tail -20 build.log

          echo "=== CHECK BUILD RESULT ==="
          if ! tail -1 build.log | grep -q "BUILD SUCCEEDED"; then
            echo "BUILD FAILED! Full log tail:"
            tail -50 build.log
            exit 1
          fi

          echo "=== FINDING APP ==="
          find build/DerivedData -name "*.app" -type d 2>/dev/null || echo "No .app found"

      - name: Create IPA
        run: |
          set -e
          
          APP_PATH=$(find build/DerivedData -name "RifatCamPro.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app bundle not found!"
            find build/ -type f -name "*.app" 2>/dev/null
            exit 1
          fi
          
          echo "Found app: $APP_PATH"
          ls -la "$APP_PATH/"
          
          mkdir -p Staging/Payload
          cp -R "$APP_PATH" Staging/Payload/RifatCamPro.app
          
          cd Staging
          zip -r -y ../RifatCamPro.ipa Payload/
          cd ..
          
          ls -la RifatCamPro.ipa
          unzip -l RifatCamPro.ipa | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RifatCamPro-v1.0-${{ github.run_number }}
          path: RifatCamPro.ipa
          retention-days: 30
          if-no-files-found: error
