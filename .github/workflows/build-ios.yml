name: Build RifatCamPro iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Verify Project
        run: |
          ls -la RifatCamPro.xcodeproj/
          echo "Project generated successfully"

      - name: Build Without Signing
        run: |
          xcodebuild -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            build 2>&1 | tail -50

      - name: Package IPA
        run: |
          BUILD_DIR=$(find ~/Library/Developer/Xcode/DerivedData -name "RifatCamPro.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          
          if [ -z "$BUILD_DIR" ]; then
            BUILD_DIR=$(find ~/Library/Developer/Xcode/DerivedData -name "RifatCamPro.app" 2>/dev/null | head -1)
          fi
          
          mkdir -p ipa_output/Payload
          
          if [ -n "$BUILD_DIR" ]; then
            echo "Found: $BUILD_DIR"
            cp -R "$BUILD_DIR" ipa_output/Payload/
          else
            echo "No .app found, build may have failed"
            exit 1
          fi
          
          cd ipa_output
          zip -r ../RifatCamPro.ipa Payload/
          cd ..
          mv RifatCamPro.ipa ipa_output/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RifatCamPro-build-${{ github.run_number }}
          path: ipa_output/RifatCamPro.ipa
          retention-days: 30
          if-no-files-found: warn
