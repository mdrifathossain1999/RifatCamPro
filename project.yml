name: RifatCamPro
options:
  bundleIdPrefix: com.rifatcam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: RifatCamPro/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  RifatCamPro:
    type: application
    platform: iOS
    sources:
      - path: RifatCamPro
        excludes:
          - "**/*.xcconfig"
          - "Resources/Preview Content"
    resources:
      - path: RifatCamPro/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rifatcam.pro
        PRODUCT_NAME: RifatCamPro
        INFOPLIST_FILE: RifatCamPro/Info.plist
        CODE_SIGN_ENTITLEMENTS: RifatCamPro/RifatCamPro.entitlements
    info:
      path: RifatCamPro/Info.plist
    entitlements:
      path: RifatCamPro/RifatCamPro.entitlements
